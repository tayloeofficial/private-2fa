<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Private-2fa</title>
<link rel="stylesheet" href="style.css">
</head>
<body>



  <div class="topbar">
  <h1>2fa Code Generator</h1>

  <button id="theme_toggle" class="theme-toggle" aria-label="Toggle theme">

    <!-- Moon -->
    <svg
      id="moon_icon"
      xmlns="http://www.w3.org/2000/svg"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/>
    </svg>

    <!-- Sun -->
    <svg
      id="sun_icon"
      xmlns="http://www.w3.org/2000/svg"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      style="display:none"
    >
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>

  </button>
</div>





  <div class="small">
  
  To Generate a Time-based One-Time Password (OTP or TOTP) Paste a Base32 secret.
    
 <!--  Paste a Base32 secret or  <code>otpauth://</code> URI   -->   
    
   <p>Everything runs locally in your browser.</p> </div>

  <div class="card">
    <textarea id="input" placeholder="Paste secret here"></textarea>
    <button id="generate_otp">Generate</button>
    <button class="secondary" id="copy">Copy token</button>
    <div id="status" class="small" style="margin-top:10px"></div>
  </div>

  <div class="card">
    <div id="token" class="token">------</div>
    <div class="meta">
    <!---->  <div>Issuer: <span id="issuer">-</span></div>
      <div>Account: <span id="account">-</span></div>
      <div>Expires in: <span id="countdown">-</span>s</div>
    </div>
  </div>

<script src="script.js"> </script>

</body>
</html>
